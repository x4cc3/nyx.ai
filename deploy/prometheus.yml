global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: nyx-api
    static_configs:
      - targets: ["api:9080"]

  - job_name: nyx-orchestrator
    static_configs:
      - targets: ["orchestrator:9081"]

  - job_name: nyx-executor
    static_configs:
      - targets: ["executor:9082"]
