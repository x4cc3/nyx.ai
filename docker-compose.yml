      NYX_ACTION_RESULT_SUBJECT: ${NYX_ACTION_RESULT_SUBJECT:-nyx.actions.result}
      NYX_EVENT_STREAM: ${NYX_EVENT_STREAM:-NYX_EVENTS}
      NYX_EVENT_SUBJECT: ${NYX_EVENT_SUBJECT:-nyx.events.flow}
      NYX_DLQ_STREAM: ${NYX_DLQ_STREAM:-NYX_DLQ}
