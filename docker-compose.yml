      NYX_POLL_INTERVAL: ${NYX_POLL_INTERVAL:-1500ms}
      NYX_FLOW_STREAM: ${NYX_FLOW_STREAM:-NYX_FLOW_RUNS}
      NYX_FLOW_SUBJECT: ${NYX_FLOW_SUBJECT:-nyx.flows.run}
      NYX_FLOW_CONSUMER: ${NYX_FLOW_CONSUMER:-nyx-orchestrator}
      NYX_ACTION_STREAM: ${NYX_ACTION_STREAM:-NYX_ACTION_REQUESTS}
      NYX_ACTION_SUBJECT: ${NYX_ACTION_SUBJECT:-nyx.actions.execute}
