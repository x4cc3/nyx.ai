      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9082/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: nyx-web:${NYX_VERSION:-dev}
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_SITE_URL: ${NYX_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    environment:
      NYX_API_BASE_URL: ${NYX_WEB_API_BASE_URL:-http://api:8080/api}
      NYX_SITE_URL: ${NYX_SITE_URL:-http://localhost:3000}
      NYX_API_KEY: ${NYX_WEB_API_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NYX_SITE_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  nyx-postgres-data:
  nyx-nats-data:
  nyx-executor-workspaces:
  nyx-browser-artifacts:
