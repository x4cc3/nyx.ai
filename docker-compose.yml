x-nyx-service: &nyx-service
  restart: unless-stopped
  environment:
    NYX_VERSION: ${NYX_VERSION:-dev}
    NYX_COMMIT: ${NYX_COMMIT:-unknown}
    NYX_BUILD_DATE: ${NYX_BUILD_DATE:-unknown}
    POSTGRES_DB: ${POSTGRES_DB:-nyx}
    POSTGRES_USER: ${POSTGRES_USER:-nyx}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    DATABASE_URL: postgres://${POSTGRES_USER:-nyx}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-nyx}?sslmode=disable
    NATS_URL: nats://nats:4222
    NYX_LISTEN_ADDR: ${NYX_LISTEN_ADDR:-:8080}
    NYX_SERVICE_NAME: ${NYX_SERVICE_NAME:-nyx-api}
    NYX_AGENT_RUNTIME_MODE: ${NYX_AGENT_RUNTIME_MODE:-openai}
    NYX_POLL_INTERVAL: ${NYX_POLL_INTERVAL:-1500ms}
    NYX_FLOW_STREAM: ${NYX_FLOW_STREAM:-NYX_FLOW_RUNS}
    NYX_FLOW_SUBJECT: ${NYX_FLOW_SUBJECT:-nyx.flows.run}
    NYX_FLOW_CONSUMER: ${NYX_FLOW_CONSUMER:-nyx-orchestrator}
    NYX_ACTION_STREAM: ${NYX_ACTION_STREAM:-NYX_ACTION_REQUESTS}
    NYX_ACTION_SUBJECT: ${NYX_ACTION_SUBJECT:-nyx.actions.execute}
    NYX_ACTION_CONSUMER: ${NYX_ACTION_CONSUMER:-nyx-executor}
    NYX_ACTION_RESULT_STREAM: ${NYX_ACTION_RESULT_STREAM:-NYX_ACTION_RESULTS}
    NYX_ACTION_RESULT_SUBJECT: ${NYX_ACTION_RESULT_SUBJECT:-nyx.actions.result}
    NYX_EVENT_STREAM: ${NYX_EVENT_STREAM:-NYX_EVENTS}
    NYX_EVENT_SUBJECT: ${NYX_EVENT_SUBJECT:-nyx.events.flow}
    NYX_DLQ_STREAM: ${NYX_DLQ_STREAM:-NYX_DLQ}
    NYX_DLQ_SUBJECT: ${NYX_DLQ_SUBJECT:-nyx.dlq}
    NYX_QUEUE_MAX_DELIVER: ${NYX_QUEUE_MAX_DELIVER:-3}
    NYX_ACTION_RESULT_TIMEOUT: ${NYX_ACTION_RESULT_TIMEOUT:-30s}
    NYX_EXECUTOR_MODE: ${NYX_EXECUTOR_MODE:-docker}
    NYX_EXECUTOR_IMAGE: ${NYX_EXECUTOR_IMAGE:-alpine:3.20}
    NYX_EXECUTOR_IMAGE_FOR_PENTEST: ${NYX_EXECUTOR_IMAGE_FOR_PENTEST:-nyx-executor-pentest:latest}
    NYX_EXECUTOR_WORKSPACE_ROOT: ${NYX_EXECUTOR_WORKSPACE_ROOT:-/tmp/nyx-executor}
    NYX_EXECUTOR_NETWORK_MODE: ${NYX_EXECUTOR_NETWORK_MODE:-none}
    NYX_EXECUTOR_NETWORK_NAME: ${NYX_EXECUTOR_NETWORK_NAME:-}
    NYX_EXECUTOR_ENABLE_NET_RAW: ${NYX_EXECUTOR_ENABLE_NET_RAW:-false}
    NYX_BROWSER_MODE: ${NYX_BROWSER_MODE:-chromedp}
    NYX_BROWSER_TIMEOUT: ${NYX_BROWSER_TIMEOUT:-20s}
    NYX_BROWSER_ARTIFACTS_ROOT: ${NYX_BROWSER_ARTIFACTS_ROOT:-/tmp/nyx-browser}
    NYX_BROWSER_HEADLESS: ${NYX_BROWSER_HEADLESS:-true}
    NYX_BROWSER_EXECUTABLE: ${NYX_BROWSER_EXECUTABLE:-/usr/bin/chromium}
    NYX_SEARCH_MODE: ${NYX_SEARCH_MODE:-duckduckgo}
    NYX_SEARCH_BASE_URL: ${NYX_SEARCH_BASE_URL:-}
    NYX_SEARCH_TIMEOUT: ${NYX_SEARCH_TIMEOUT:-12s}
    NYX_SEARCH_RESULT_LIMIT: ${NYX_SEARCH_RESULT_LIMIT:-5}
    NYX_SEARCH_USER_AGENT: ${NYX_SEARCH_USER_AGENT:-NYX/2 autonomous-search}
    SUPABASE_URL: ${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-}}
    SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1-codex-mini}
    OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-high}
    OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-8000}
    NYX_MEMORY_EMBEDDINGS_MODE: ${NYX_MEMORY_EMBEDDINGS_MODE:-auto}
    OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    OPENAI_EMBEDDING_DIMS: ${OPENAI_EMBEDDING_DIMS:-1536}
    NYX_API_KEY: ${NYX_API_KEY:-}
    NYX_DEFAULT_TENANT: ${NYX_DEFAULT_TENANT:-default}
    NYX_REQUIRE_FLOW_APPROVAL: ${NYX_REQUIRE_FLOW_APPROVAL:-true}
    NYX_LOG_FORMAT: ${NYX_LOG_FORMAT:-json}
    NYX_LOG_LEVEL: ${NYX_LOG_LEVEL:-info}
  volumes:
    - nyx-executor-workspaces:/tmp/nyx-executor
    - nyx-browser-artifacts:/tmp/nyx-browser

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nyx}
      POSTGRES_USER: ${POSTGRES_USER:-nyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - nyx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nyx} -d ${POSTGRES_DB:-nyx}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.11-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nyx-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    <<: *nyx-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: migrate
        VERSION: ${NYX_VERSION:-dev}
        COMMIT: ${NYX_COMMIT:-unknown}
        BUILD_DATE: ${NYX_BUILD_DATE:-unknown}
    image: nyx-migrate:${NYX_VERSION:-dev}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *nyx-service
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
